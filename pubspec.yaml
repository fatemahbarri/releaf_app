name: releaf_app
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  flutter_map: ^7.0.2
  url_launcher: ^6.2.6
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  firebase_core: ^2.30.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  flutter_svg: ^2.0.10+1
  flutter_custom_clippers: ^2.1.0
  tflite_flutter: ^0.11.0
  image_picker: ^1.1.2
  image: ^4.2.0
  shared_preferences: ^2.3.2
  flutter_markdown_plus: ^1.0.6
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-Bold.ttf

  assets:
    - assets/model/best_model.tflite
    - assets/model/labels.txt
    - assets/images/
    - assets/images/waves/
    - assets/icons/